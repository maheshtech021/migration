name: Provision Queues

# Triggered by the self-service portal when a user enables Queues.
# Creates {reponame}-dev and {reponame}-qa queues if they don't already exist.
# Idempotent — safe to re-run at any time.
on:
  workflow_dispatch:

jobs:
  provision:
    name: Provision Queues (dev + qa)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Provision queues
        run: |
          REPO_RAW="${GITHUB_REPOSITORY##*/}"
          REPO=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/-+/-/g; s/^-|-$//g')

          for ENV in dev qa; do
            NAME="${REPO}-${ENV}"
            echo "── $NAME ──"

            # Search by name — paginate through all queues
            EXISTING=""
            PAGE=1
            while true; do
              RESPONSE=$(curl -s \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/queues?per_page=100&page=${PAGE}")

              SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
              if [ "$SUCCESS" != "true" ]; then
                echo "CF API error while listing queues:"
                echo "$RESPONSE" | jq .
                exit 1
              fi

              EXISTING=$(echo "$RESPONSE" | jq -r --arg n "$NAME" '.result[] | select(.queue_name == $n) | .queue_name' | head -1)
              [ -n "$EXISTING" ] && break

              TOTAL=$(echo "$RESPONSE" | jq -r '.result | length')
              [ "$TOTAL" -lt 100 ] && break
              PAGE=$((PAGE + 1))
            done

            if [ -n "$EXISTING" ]; then
              echo "Already exists: ${NAME}"
              continue
            fi

            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"queue_name\": \"${NAME}\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/queues")

            SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
            if [ "$SUCCESS" != "true" ]; then
              echo "Failed to create: ${NAME}"
              echo "$RESPONSE" | jq .
              exit 1
            fi
            echo "Created: ${NAME}"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
